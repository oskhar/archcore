services:
  # ============================================================
  # Monolith Architecture — Baseline
  # Resource budget: 2.0 CPU, 2GB RAM untuk 1 proses
  # ============================================================
  monolith:
    build:
      context: ../../apps/monolith
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql-monolith
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_NAME=archkit_monolith
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    ports:
      - "3000:3000"
    depends_on:
      mysql-monolith:
        condition: service_healthy
    networks:
      - archkit-network

  # ============================================================
  # Hybrid Architecture — Experimental
  # Resource budget EQUAL: Total 2.0 CPU, 2GB RAM dibagi ke 4 proses
  # tanpa horizontal scale. Pengujian ini memperlihatkan architectural tax
  # hybrid ketika tidak ada tambahan kapasitas dari scale-out.
  #
  # Distribusi proporsional:
  #   Gateway : 0.8 CPU, 768MB
  #   Services: 0.4 CPU x 3 = 1.2 CPU total, 448MB x 3 = 1.3GB
  #   TOTAL   : 2.0 CPU, ~2.1GB RAM
  # ============================================================
  api-gateway:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: api-gateway
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - INVENTORY_SERVICE_URL=http://inventory-service:3002
      - SALES_SERVICE_URL=http://sales-service:3003
      - KAFKA_BROKERS=redpanda:29092
      - NODE_OPTIONS=--max-old-space-size=640
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 768M
    ports:
      - "4000:3000"
    depends_on:
      - product-service
      - inventory-service
      - sales-service
    networks:
      - archkit-network

  product-service:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: product-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=mysql-product
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_DATABASE=archkit_product
      - KAFKA_BROKERS=redpanda:29092
      - DB_POOL_SIZE=15
      - NODE_OPTIONS=--max-old-space-size=384
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 448M
    ports:
      - "3001:3001"
    depends_on:
      mysql-product:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - archkit-network

  inventory-service:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: inventory-service
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=mysql-inventory
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_DATABASE=archkit_inventory
      - KAFKA_BROKERS=redpanda:29092
      - DB_POOL_SIZE=15
      - NODE_OPTIONS=--max-old-space-size=384
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 448M
    ports:
      - "3002:3002"
    depends_on:
      mysql-inventory:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - archkit-network

  sales-service:
    build:
      context: ../../apps/hybrid
      dockerfile: Dockerfile
      args:
        APP_NAME: sales-service
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DB_HOST=mysql-sales
      - DB_PORT=3306
      - DB_USERNAME=archkit_user
      - DB_PASSWORD=archkit_password
      - DB_DATABASE=archkit_sales
      - KAFKA_BROKERS=redpanda:29092
      - DB_POOL_SIZE=15
      - NODE_OPTIONS=--max-old-space-size=384
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 448M
    ports:
      - "3003:3003"
    depends_on:
      mysql-sales:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - archkit-network

networks:
  archkit-network:
    name: archkit-network
    driver: bridge
