config:
  target: 'http://localhost:3000'
  phases:
    - duration: 60
      arrivalRate: 20
      name: Scale warm up
    - duration: 180
      arrivalRate: 80
      rampTo: 160
      name: Scale ramp
    - duration: 300
      arrivalRate: 180
      name: Scale sustained high load
  processor: './processor.js'

scenarios:
  - name: 'Scale Product CRUD Lifecycle'
    flow:
      - post:
          url: '/products'
          json:
            name: 'Scale Lab Test Product'
            price: 99.99
            category: 'Electronics'
            description: 'A high-throughput product lifecycle test'
          capture:
            - json: '$.id'
              as: 'productId'
      - get:
          url: '/products/{{ productId }}'
      - patch:
          url: '/products/{{ productId }}'
          json:
            name: 'Updated Scale Product'
      - get:
          url: '/products'
