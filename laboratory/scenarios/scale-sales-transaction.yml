config:
  target: 'http://localhost:3000'
  phases:
    - duration: 60
      arrivalRate: 8
      name: Scale warm up
    - duration: 180
      arrivalRate: 35
      rampTo: 80
      name: Scale ramp
    - duration: 300
      arrivalRate: 90
      name: Scale sustained high load
  processor: './processor.js'

scenarios:
  - name: 'Scale E2E Sales Transaction'
    flow:
      - post:
          url: '/products'
          json:
            name: 'Scale Sales Test Product'
            price: 150.00
            category: 'Electronics'
            description: 'A product for high-throughput sales transaction testing'
          capture:
            - json: '$.id'
              as: 'productId'
      - post:
          url: '/inventory/adjust'
          json:
            productId: '{{ productId }}'
            delta: 50
      - post:
          url: '/sales/transaction'
          json:
            items:
              - productId: '{{ productId }}'
                quantity: 2
          capture:
            - json: '$.id'
              as: 'transactionId'
      - get:
          url: '/sales/transactions/{{ transactionId }}'
      - get:
          url: '/inventory/{{ productId }}'
