config:
  target: 'http://localhost:3000'
  phases:
    - duration: 60
      arrivalRate: 15
      name: Scale warm up
    - duration: 180
      arrivalRate: 60
      rampTo: 120
      name: Scale ramp
    - duration: 300
      arrivalRate: 140
      name: Scale sustained high load
  processor: './processor.js'

scenarios:
  - name: 'Scale Inventory Stock Sync'
    flow:
      - post:
          url: '/products'
          json:
            name: 'Scale Inventory Test Product'
            price: 50.00
            category: 'Electronics'
            description: 'A product for high-throughput inventory testing'
          capture:
            - json: '$.id'
              as: 'productId'
      - post:
          url: '/inventory/adjust'
          json:
            productId: '{{ productId }}'
            delta: 100
      - get:
          url: '/inventory/{{ productId }}'
      - post:
          url: '/inventory/adjust'
          json:
            productId: '{{ productId }}'
            delta: -10
      - get:
          url: '/inventory/{{ productId }}'
