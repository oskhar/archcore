config:
  target: 'http://localhost:3000'
  phases:
    - duration: 60
      arrivalRate: 5
      name: Equal warm up
    - duration: 240
      arrivalRate: 15
      name: Equal sustained load
    - duration: 60
      arrivalRate: 30
      rampTo: 50
      name: Equal stress peak
  processor: './processor.js'

scenarios:
  - name: 'Equal Inventory Stock Sync'
    flow:
      - post:
          url: '/products'
          json:
            name: 'Equal Inventory Test Product'
            price: 50.00
            category: 'Electronics'
            description: 'A product for inventory testing'
          capture:
            - json: '$.id'
              as: 'productId'
      - post:
          url: '/inventory/adjust'
          json:
            productId: '{{ productId }}'
            delta: 100
      - get:
          url: '/inventory/{{ productId }}'
      - post:
          url: '/inventory/adjust'
          json:
            productId: '{{ productId }}'
            delta: -10
      - get:
          url: '/inventory/{{ productId }}'
